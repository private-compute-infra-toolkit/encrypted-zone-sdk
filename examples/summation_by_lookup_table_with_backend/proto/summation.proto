syntax = "proto3";

package summation;

option java_multiple_files = true;
option java_outer_classname = "SummationProto";
option java_package = "io.grpc.playground.summation";

// Service definition for the summation server.
service SimpleAdd {
  rpc IntegerSequence(IntegerSequenceRequest) returns (IntegerSequenceResponse) {}
  rpc StreamingIntegerSequence(stream IntegerSequenceRequest) returns (stream IntegerSequenceResponse) {}
}

// This service is added to test multiple services per Isolate.
service CloneSimpleAdd {
  rpc CloneIntegerSequence(IntegerSequenceRequest) returns (IntegerSequenceResponse);
}

message IntegerSequenceRequest {
  int64 start_at = 1;
  int64 end_at = 2;
  // Only set this (non-zero) if you want the RPC to fail when
  // the result of the operation does not match your expectation.
  optional int64 expected_result = 99;
}

message IntegerSequenceResponse {
  // The result of adding all integers in the requested sequence.
  int64 sequence_sum = 1;
}
