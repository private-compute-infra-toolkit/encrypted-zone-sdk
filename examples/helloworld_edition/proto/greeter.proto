edition = "2023";

package helloworld;

import "enforcer/v1/options.proto";

// The greeting service definition.
service Greeter {
  option (enforcer.v1.ez_svc_annotation) = {};

  // Sends a greeting
  rpc SayHello(HelloRequest) returns (HelloReply) {
    option (enforcer.v1.ez_rpc_annotation) = {name: "SayHello"};
  }

  // Bidirectional Streaming greeting
  rpc StreamingSayHello(stream HelloRequest) returns (stream HelloReply) {
    option (enforcer.v1.ez_rpc_annotation) = {name: "StreamingSayHello"};
  }
}

// A non-ez service that will not get autogenerated code since it lacks
// the "enforcer.v1.ez_svc_annotation" service annotation.
service NonEzGreeter {
  // Sends a greeting
  rpc SayHello(HelloRequest) returns (HelloReply) {
    option (enforcer.v1.ez_rpc_annotation) = {name: "SayHello"};
  }

  // Bidirectional Streaming greeting
  rpc StreamingSayHello(stream HelloRequest) returns (stream HelloReply) {
    option (enforcer.v1.ez_rpc_annotation) = {name: "StreamingSayHello"};
  }
}

// The request message containing the user's name.
message HelloRequest {
  // Demonstrate edition functionality
  string name = 1 [features.field_presence = LEGACY_REQUIRED];
}

// The response message containing the greetings
message HelloReply {
  // Demonstrate edition functionality
  string message = 1 [features.field_presence = LEGACY_REQUIRED];
}
