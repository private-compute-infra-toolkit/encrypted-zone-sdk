syntax = "proto3";

package enforcer.v1;

import "proto/attestation/endorsement.proto";
import "proto/attestation/evidence.proto";

// Service for managing Mutual TLS (mTLS) identity and routing within the
// Encrypted Zone (EZ).
//
// All communication between EZ nodes is authenticated and encrypted using mTLS.
// This service allows nodes to:
// 1. Obtain a valid X.509 certificate for themselves (GetCertificate).
// 2. Advertise which services (Isolates) they are hosting so traffic can be
//    routed to them (ReportSni).
service EzMtlsService {
  // Requests a new X.509 certificate for the calling node.
  //
  // This is the "bootstrapping" step where a node proves its identity (using
  // hardware attestation) and gets a certificate that allows it to talk to
  // other nodes in the mesh.
  rpc GetCertificate(GetCertificateRequest) returns (GetCertificateResponse) {}

  // Reports the list of "active" SNI (Server Name Indication) values this node
  // can handle.
  //
  // In the EZ mesh, traffic should be routed based on the SNI extension in the TLS
  // handshake. By calling this, a node effectively says "I am hosting these
  // specific Isolates, send their traffic to me."
  rpc ReportSni(ReportSniRequest) returns (ReportSniResponse) {}
}

// Request to update the routing table with the services hosted by this node.
//
// This should be called whenever the set of active Isolates changes (e.g.,
// after loading a new EzManifest). If a previously reported SNI is omitted
// from a subsequent call, it will be removed from the routing table.
message ReportSniRequest {
  // A list of SNI strings this node is listening for.
  //
  // The SNI format MUST be:
  //   {ez_instance_id}-{hash}-{version}.{trust_domain}
  //
  // Components:
  //   - {version}: Current version identifier (e.g., "a"). If the hashing
  //     algorithm changes, this version will increment.
  //   - {trust_domain}: The DNS trust domain of the mesh (e.g., "example.com").
  //   - {ez_instance_id}: A unique tag for the EZ instance. If empty, the node
  //     accepts traffic for any instance tag (wildcard).
  //
  //   - {hash}: A 32-character hexadecimal prefix of the SHA-256 hash of the
  //     following string concatenation:
  //       hash = HEX(SHA256(
  //         isolate_name + len(isolate_name) + "/" +
  //         publisher_id + len(publisher_id) + "/" +
  //         len(operator_domain) + "/" + operator_domain
  //       )[0..32])
  //
  //     Note: Lengths are string references to the integer value (e.g., "4").
  repeated string sni = 1;
}

message ReportSniResponse {}

// Request for a node's identity certificate.
//
// This enables a node to join the mTLS mesh. The request combines a standard
// CSR with hardware attestation evidence to prove the node is running genuine
// software on genuine hardware.
message GetCertificateRequest {
  // A Certificate Signing Request (CSR) encoded in DER format.
  //
  // The CSR contains the public key and the requested subject name for the
  // certificate. The EZ Certificate Authority (CA) will sign this request
  // if the accompanying attestation evidence is valid.
  bytes csr = 1;

  // Hardware attestation evidence verifying the node's integrity.
  //
  // This typically includes a DICE (Device Identifier Composition Engine) chain
  // or similar hardware-rooted proof that links the CSR's public key to the
  // underlying trusted hardware (TEE).
  .oak.attestation.v1.Evidence evidence = 2;

  // Supplementary endorsements for the attestation evidence.
  //
  // This includes signatures or certificates from the platform vendor (e.g.,
  // AMD, Intel) or other verifiers that certify the validity of the hardware
  // and firmware components described in the `evidence`.
  .oak.attestation.v1.Endorsements endorsements = 3;
}

// Response containing the signed certificate.
message GetCertificateResponse {
  // TODO: Remove this field in favor of certs.
  bytes cert_chain = 1;
  // The signed X.509 certificate chain, encoded in DER format.
  //
  // structure:
  //   [Leaf Certificate (The specific node cert)]
  //   [Intermediate CA Certificate 1]
  //   [Intermediate CA Certificate 2]
  //   ...
  //
  // The Root CA certificate (trust anchor) is typically distributed separately
  // and may not be included in this chain.
  repeated bytes certs = 2;
}
