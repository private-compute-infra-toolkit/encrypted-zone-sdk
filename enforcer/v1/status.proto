syntax = "proto3";

// TODO: Refactor, move to a common namespace
package enforcer.v1;

// Specifies import path for the generated Go code used to auto-generate SDK code from proto annotations.
option go_package = "github.com/private-compute-infra-toolkit/ez/sdk/v1";

// Wire-format matches that of grpc's standard google.rpc.Status message,
// but doesn't have external dependencies and doesn't allow extra details.
message Status {
  int32 code = 1;
  string message = 2;
}
