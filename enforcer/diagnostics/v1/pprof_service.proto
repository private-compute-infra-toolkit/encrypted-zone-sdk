syntax = "proto3";

package enforcer.diagnostics.v1;

// Request for a CPU profile.
message GetCpuProfileRequest {
  // Duration for the CPU profile collection in seconds. Must be at least 1.
  int64 duration_seconds = 1;
}

// Response containing a CPU profile.
message GetCpuProfileResponse {
  // The result of the CPU profiling.
  oneof result {
    // CPU profile data in gzipped pprof format.
    bytes pprof_data = 1;
    // Error message if the profiling failed.
    string error = 2;
  }
}

// Service to retrieve pprof CPU profiles.
service PprofService {
  // Returns a CPU profile from the enforcer.
  rpc GetCpuProfile(GetCpuProfileRequest) returns (GetCpuProfileResponse);
}
